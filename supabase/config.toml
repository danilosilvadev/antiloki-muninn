# Supabase CLI config. `supabase link --project-ref <ref>` connects this to the
# real project; `supabase db push` applies migrations/; `supabase functions deploy`
# ships the functions below.
project_id = "antiloki-muninn"

# All three slice-0 functions are public endpoints (the landing form, unsubscribe
# links in emails, referral links) — callers carry no Supabase JWT.
[functions.waitlist-join]
verify_jwt = false

[functions.unsub]
verify_jwt = false

[functions.r]
verify_jwt = false

[functions.webhook-sink]
verify_jwt = false

# slice-4 public endpoints: the thank-you page's consent opt-in POST and the
# invite link inside wave emails — callers carry no Supabase JWT.
[functions.consent]
verify_jwt = false

[functions.invite]
verify_jwt = false

